  <line x1="67" y1="130" x2="173" y2="130" stroke="#80DEEA" stroke-width="1.5" />
  
  <!-- Continents (simplifiés) -->
  <path d="M160 80C155 70 150 75 145 80C140 85 130 70 125 75C120 80 115 75 110 80C105 85 100 80 95 85C90 90 85 85 80 90V110C85 105 90 110 95 105C100 100 105 105 110 100C115 95 120 100 125 95C130 90 135 100 140 95C145 90 150 95 155 90C160 85 155 88 160 80Z" fill="#006064" />
  
