<svg width="240" height="200" viewBox="0 0 240 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond -->
  <circle cx="120" cy="100" r="80" fill="#E0F7FA" />
  
  <!-- Cloche principale -->
  <path d="M120 150C115 150 110 148 110 140H130C130 148 125 150 120 150Z" fill="#006064" />
  <path d="M120 60C100 60 90 75 90 90V130H150V90C150 75 140 60 120 60Z" fill="#80DEEA" stroke="#006064" stroke-width="2" />
  
  <!-- Dessus de la cloche -->
  <circle cx="120" cy="60" r="5" fill="#006064" />
  
  <!-- Ondes de notification -->
  <path d="M85 90C85 90 75 85 75 75C75 65 85 60 85 60" stroke="#00BCD4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M155 90C155 90 165 85 165 75C165 65 155 60 155 60" stroke="#00BCD4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Icône d'alerte -->
  <circle cx="180" cy="50" r="15" fill="#FFC107" />
  <text x="180" y="55" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#FFFFFF">!</text>
  
  <!-- Symbole de message -->
  <rect x="150" y="110" width="40" height="30" rx="4" fill="#FFFFFF" stroke="#006064" stroke-width="2" />
  <path d="M150 115L170 130L190 115" stroke="#006064" stroke-width="2" />
  
  <!-- Points d'alerte -->
  <circle cx="85" cy="105" r="5" fill="#F44336" />
  <circle cx="75" cy="120" r="3" fill="#F44336" />
  <circle cx="155" cy="105" r="3" fill="#F44336" />
  <circle cx="165" cy="125" r="5" fill="#F44336" />
  
  <!-- Smartphone pour illustrer les notifications mobiles -->
  <rect x="60" y="100" width="25" height="40" rx="3" fill="#FFFFFF" stroke="#006064" stroke-width="2" />
  <line x1="70" y1="105" x2="75" y2="105" stroke="#006064" stroke-width="2" />
  <line x1="70" y1="110" x2="75" y2="110" stroke="#006064" stroke-width="2" />
  <line x1="70" y1="115" x2="75" y2="115" stroke="#006064" stroke-width="2" />
  <rect x="67" y="130" width="10" height="5" rx="1" fill="#006064" />
</svg> 