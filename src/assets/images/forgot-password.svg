<svg width="240" height="200" viewBox="0 0 240 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Cercle de fond -->
  <circle cx="120" cy="100" r="80" fill="#E0F7FA" />
  
  <!-- Cadenas -->
  <rect x="90" y="80" width="60" height="50" rx="8" fill="#006064" />
  <rect x="95" y="85" width="50" height="40" rx="5" fill="#80DEEA" />
  
  <!-- Trou de serrure -->
  <circle cx="120" cy="105" r="8" fill="#006064" />
  <rect x="118" y="105" width="4" height="12" fill="#006064" />
  
  <!-- Anneau du cadenas -->
  <path d="M120 80C120 80 120 50 120 50C120 40 130 35 140 40C150 45 145 60 135 65" stroke="#006064" stroke-width="6" stroke-linecap="round" />
  
  <!-- Flèches tournant autour du cadenas -->
  <path d="M70 70C60 90 60 110 70 130" stroke="#00BCD4" stroke-width="3" stroke-linecap="round" />
  <path d="M70 70L60 65" stroke="#00BCD4" stroke-width="3" stroke-linecap="round" />
  <path d="M70 70L65 60" stroke="#00BCD4" stroke-width="3" stroke-linecap="round" />
  
  <path d="M170 70C180 90 180 110 170 130" stroke="#00BCD4" stroke-width="3" stroke-linecap="round" />
  <path d="M170 130L180 135" stroke="#00BCD4" stroke-width="3" stroke-linecap="round" />
  <path d="M170 130L175 140" stroke="#00BCD4" stroke-width="3" stroke-linecap="round" />
  
  <!-- Email (enveloppe) -->
  <rect x="90" y="150" width="60" height="35" rx="4" fill="white" stroke="#006064" stroke-width="2" />
  <path d="M90 155L120 175L150 155" stroke="#006064" stroke-width="2" />
  
  <!-- Clé -->
  <circle cx="190" cy="50" r="10" fill="#006064" />
  <rect x="185" y="60" width="10" height="25" rx="2" fill="#006064" />
  <rect x="187" y="70" width="6" height="10" rx="1" fill="#80DEEA" />
  <rect x="191" y="75" width="10" height="3" rx="1" fill="#006064" transform="rotate(90 191 75)" />
</svg> 